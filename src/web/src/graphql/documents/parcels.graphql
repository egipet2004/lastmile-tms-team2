query GetRegisteredParcels {
  registeredParcels {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    parcelType
    createdAt
    zoneName
  }
}

query GetPreLoadParcels {
  preLoadParcels {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    parcelType
    createdAt
    zoneName
  }
}

query GetParcelImports {
  parcelImports {
    id
    fileName
    fileFormat
    status
    totalRows
    processedRows
    importedRows
    rejectedRows
    depotName
    createdAt
    startedAt
    completedAt
  }
}

query GetParcelImport($id: UUID!) {
  parcelImport(id: $id) {
    id
    fileName
    fileFormat
    status
    totalRows
    processedRows
    importedRows
    rejectedRows
    depotName
    failureMessage
    createdAt
    startedAt
    completedAt
    createdTrackingNumbers
    rowFailuresPreview {
      rowNumber
      errorMessage
      originalRowValues
    }
  }
}

query GetParcelsForRouteCreation {
  parcelsForRouteCreation {
    id
    trackingNumber
    weight
    weightUnit
  }
}

query GetParcel($id: UUID!) {
  parcel(id: $id) {
    id
    trackingNumber
    status
    shipperAddressId
    serviceType
    weight
    weightUnit
    length
    width
    height
    dimensionUnit
    declaredValue
    currency
    description
    parcelType
    cancellationReason
    estimatedDeliveryDate
    deliveryAttempts
    zoneId
    zoneName
    depotId
    depotName
    createdAt
    lastModifiedAt
    canEdit
    canCancel
    recipientAddress {
      street1
      street2
      city
      state
      postalCode
      countryCode
      isResidential
      contactName
      companyName
      phone
      email
    }
    changeHistory {
      action
      fieldName
      beforeValue
      afterValue
      changedAt
      changedBy
    }
  }
}

mutation RegisterParcel($input: RegisterParcelInput!) {
  registerParcel(input: $input) {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    length
    width
    height
    dimensionUnit
    declaredValue
    currency
    description
    parcelType
    estimatedDeliveryDate
    createdAt
    zoneId
    zoneName
    depotId
    depotName
    barcode
  }
}

