query GetVehicles($where: VehicleFilterInput, $order: [VehicleSortInput!]) {
  vehicles(where: $where, order: $order) {
    id
    registrationPlate
    type
    parcelCapacity
    weightCapacity
    status
    depotId
    depotName
    totalRoutes
    routesCompleted
    totalMileage
    createdAt
    updatedAt
  }
}

mutation CreateVehicle($input: CreateVehicleInput!) {
  createVehicle(input: $input) {
    id
    registrationPlate
    type
    parcelCapacity
    weightCapacity
    status
    depotId
    depotName
    totalRoutes
    routesCompleted
    totalMileage
    createdAt
    updatedAt
  }
}

mutation UpdateVehicle($id: UUID!, $input: UpdateVehicleInput!) {
  updateVehicle(id: $id, input: $input) {
    id
    registrationPlate
    type
    parcelCapacity
    weightCapacity
    status
    depotId
    depotName
    totalRoutes
    routesCompleted
    totalMileage
    createdAt
    updatedAt
  }
}

mutation DeleteVehicle($id: UUID!) {
  deleteVehicle(id: $id)
}
