schema {
  query: Query
  mutation: Mutation
}

type Address {
  street1: String!
  street2: String
  city: String!
  state: String!
  postalCode: String!
  countryCode: String!
  isResidential: Boolean!
  contactName: String
  companyName: String
  phone: String
  email: String
}

type Depot {
  id: UUID!
  name: String!
  address: Address
  operatingHours: [OperatingHours!]
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime
}

type DriverReadModel {
  id: UUID!
  firstName: String!
  lastName: String!
  displayName: String!
  phone: String
  email: String
  depotId: UUID!
  status: DriverStatus!
}

type Mutation @authorize(roles: [ "Admin" ]) {
  createDepot(input: CreateDepotInput!): Depot! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateDepot(id: UUID! input: UpdateDepotInput!): Depot @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteDepot(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  registerParcel(input: RegisterParcelInput!): ParcelDto! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  createRoute(input: CreateRouteDtoInput!): RouteDto! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  createUser(input: CreateUserInput!): UserManagementUserDto! @cost(weight: "10")
  updateUser(input: UpdateUserInput!): UserManagementUserDto! @cost(weight: "10")
  deactivateUser(userId: UUID!): UserManagementUserDto! @cost(weight: "10")
  sendPasswordResetEmail(userId: UUID!): UserActionResultDto! @cost(weight: "10")
  requestPasswordReset(email: String!): UserActionResultDto! @allowAnonymous @cost(weight: "10")
  completePasswordReset(input: CompletePasswordResetInput!): UserActionResultDto! @allowAnonymous @cost(weight: "10")
  createVehicle(input: CreateVehicleDtoInput!): VehicleDto! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateVehicle(id: UUID! input: UpdateVehicleDtoInput!): VehicleDto @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteVehicle(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  createZone(input: CreateZoneInput!): Zone! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  updateZone(id: UUID! input: UpdateZoneInput!): Zone @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
  deleteZone(id: UUID!): Boolean! @authorize(roles: [ "Admin", "OperationsManager" ]) @cost(weight: "10")
}

type OperatingHours {
  dayOfWeek: DayOfWeek!
  openTime: TimeSpan
  closedTime: TimeSpan
  isClosed: Boolean!
}

type ParcelDto {
  id: UUID!
  trackingNumber: String!
  description: String
  serviceType: String!
  status: String!
  weight: Decimal!
  weightUnit: String!
  length: Decimal!
  width: Decimal!
  height: Decimal!
  dimensionUnit: String!
  declaredValue: Decimal!
  currency: String!
  estimatedDeliveryDate: DateTime!
  deliveryAttempts: Int!
  parcelType: String
  zoneId: UUID!
  zoneName: String
  depotId: UUID!
  depotName: String
  createdAt: DateTime!
  lastModifiedAt: DateTime
}

type ParcelOptionDto {
  id: UUID!
  trackingNumber: String!
  weight: Decimal!
  weightUnit: WeightUnit!
}

type Query @authorize(roles: [ "Admin" ]) {
  depots(order: [DepotDtoSortInput!] @cost(weight: "10") where: DepotDtoFilterInput @cost(weight: "10")): [Depot!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  depot(id: UUID!): Depot @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  drivers(depotId: UUID): [DriverReadModel!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  parcelsForRouteCreation: [ParcelOptionDto!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  routes(order: [RouteDtoSortInput!] @cost(weight: "10") where: RouteDtoFilterInput @cost(weight: "10")): [RouteDto!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  users(search: String isActive: Boolean depotId: UUID zoneId: UUID order: [UserManagementUserDtoSortInput!] @cost(weight: "10") where: UserManagementUserDtoFilterInput @cost(weight: "10")): [UserManagementUserDto!]! @cost(weight: "10")
  user(id: UUID!): [UserManagementUserDto!]! @cost(weight: "10")
  userManagementLookups: UserManagementLookupsDto! @cost(weight: "10")
  vehicles(order: [VehicleDtoSortInput!] @cost(weight: "10") where: VehicleDtoFilterInput @cost(weight: "10")): [VehicleDto!]! @authorize(roles: [ "Admin", "Dispatcher", "OperationsManager" ]) @cost(weight: "10")
  zones(order: [ZoneDtoSortInput!] @cost(weight: "10") where: ZoneDtoFilterInput @cost(weight: "10")): [Zone!]! @cost(weight: "10")
  zone(id: UUID!): Zone @cost(weight: "10")
}

